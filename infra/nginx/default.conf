server {
  listen 80;
  server_name _;
  server_tokens off;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location /api/ {
    proxy_http_version 1.1;
    proxy_pass http://backend:26031;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  # index.html must always be revalidated so the browser picks up new hashed assets.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Static assets: only cache images with long TTL.
  # JS/CSS use no-cache so watch-mode rebuilds are visible after manual refresh.
  location ~* \.(png|jpg|jpeg|gif|svg|ico)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  location ~* \.(js|css)$ {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }
}
